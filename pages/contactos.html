    <main>
        <section>
            <h2>Completa tus datos</h2>
            <form>


                <fieldset>
                    <legend>Datos basicos</legend>

                    <label for="name_form">Nombre</label>
                    <input type="text" id="name_form">

                    <label for="surname_form">Apellido</label>
                    <input type="text" id="surname_form">

                    <label for="dni_datos">DNI</label>
                    <input type="text" id="dni_datos">
                </fieldset>

                <fieldset>
                    <legend>Elegi un sistema operativo</legend>

                    <label for="10_form">Windows10</label>
                    <input type="radio" id="10_form" name="choose_one">

                    <label for="11_form">Windows11</label>
                    <input type="radio" id="11_form" name="choose_one">

                    <label for="Linux_form">Linux</label>
                    <input type="radio" id="Linux_form" name="choose_one">
                </fieldset>

                <fieldset>
                    <legend>Escribenos tu comentario</legend>

                    <textarea name="" id=""></textarea>

                    <input type="submit">
                </fieldset>
            </form>
        </section>
    </main>
